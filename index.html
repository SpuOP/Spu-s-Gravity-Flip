

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spu's Gravity Flip</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
    }
    #gameContainer {
      position: relative;
      width: 680px;
      max-width: 100vw;
    }
    canvas {
      display: block;
      width: 100%;
      border-radius: 12px;
      cursor: pointer;
    }
    #ui {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #screen {
      background: rgba(15, 15, 30, 0.93);
      border-radius: 12px;
      padding: 2rem 2.5rem;
      text-align: center;
      pointer-events: all;
      border: 1px solid rgba(83, 74, 183, 0.3);
    }
    #screen h2 {
      font-size: 28px;
      font-weight: 600;
      color: #e0e0ff;
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
    }
    #screen p {
      font-size: 14px;
      color: #9090bb;
      margin-bottom: 1.5rem;
      line-height: 1.7;
    }
    #screen p b { color: #c0b8ff; }
    #screen button {
      background: #534AB7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.65rem 2.2rem;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    #screen button:hover { background: #6a60d4; }
    #screen button:active { transform: scale(0.97); }
    #score {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      font-weight: 600;
      color: #e0e0ff;
      pointer-events: none;
      text-shadow: 0 1px 10px rgba(0,0,0,0.6);
    }
    #bestBadge {
      position: absolute;
      top: 14px;
      right: 18px;
      font-size: 13px;
      color: #9090bb;
      pointer-events: none;
    }
  </style>
</head>
<body>
 
<div id="gameContainer">
  <canvas id="c" height="360"></canvas>
  <div id="score" style="display:none">0</div>
  <div id="bestBadge" style="display:none">best: 0</div>
  <div id="ui">
    <div id="screen">
      <h2>🌀 Spu's Gravity Flip</h2>
      <p>
        Press <b>Space</b> or tap the screen to flip gravity.<br>
        Dodge the pillars — survive as long as you can!
      </p>
      <button id="startBtn">Play</button>
    </div>
  </div>
</div>
 
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const ui = document.getElementById('ui');
  const screen = document.getElementById('screen');
  const startBtn = document.getElementById('startBtn');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('bestBadge');
 
  const W = 680, H = 360;
  canvas.width = W;
  canvas.height = H;
 
  let state = 'idle';
  let ball, pillars, score, best = 0, frame, animId;
 
  const BALL_X = 110, BALL_R = 13;
const GRAVITY = 0.22;
const JUMP = -6.8;
const PIPE_W = 48;
const GAP_START = 180;
const PIPE_SPEED_START = 2.1;
const SPAWN_INTERVAL = 125;
const GROUND = H - 30, CEIL = 30;
 
  // Starfield
  let stars = Array.from({ length: 70 }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.5 + 0.3,
    s: Math.random() * 0.5 + 0.2,
    twinkle: Math.random() * Math.PI * 2
  }));
 
  function initGame() {
    ball = { y: H / 2, vy: 0, gravDir: 1, trail: [] };
    pillars = [];
    score = 0;
    frame = 0;
    scoreEl.textContent = '0';
  }
 
  function currentGap() {
    return Math.max(115, GAP_START - score * 1.8);
  }
 
  function currentSpeed() {
    return Math.min(5.2, PIPE_SPEED_START + score * 0.035);
  }
 
  function spawnPillar() {
    const gap = currentGap();
    const minTop = CEIL + 35;
    const maxTop = GROUND - gap - 35;
    const topH = Math.random() * (maxTop - minTop) + minTop;
    pillars.push({ x: W + PIPE_W, topH, gap });
  }
 
  function flip() {
    if (state !== 'playing') return;
    ball.gravDir *= -1;
    ball.vy = JUMP * ball.gravDir;
  }
 
  function update() {
    frame++;
 
    // Physics
    ball.vy += GRAVITY * ball.gravDir;
    ball.vy = Math.max(-11, Math.min(11, ball.vy));
    ball.y += ball.vy;
 
    // Trail
    ball.trail.unshift({ x: BALL_X, y: ball.y });
    if (ball.trail.length > 10) ball.trail.pop();
 
    // Boundary collision
    if (ball.y + BALL_R >= GROUND || ball.y - BALL_R <= CEIL) {
      endGame(); return;
    }
 
    // Spawn pillars
    if (frame % SPAWN_INTERVAL === 0) spawnPillar();
 
    // Move & check pillars
    const spd = currentSpeed();
    for (let i = pillars.length - 1; i >= 0; i--) {
      pillars[i].x -= spd;
      if (pillars[i].x + PIPE_W < 0) {
        pillars.splice(i, 1);
        score++;
        scoreEl.textContent = score;
        continue;
      }
      const bx = BALL_X, by = ball.y;
      const px = pillars[i].x, th = pillars[i].topH, gap = pillars[i].gap;
      // Forgiving hitbox: 2px buffer
      if (bx + BALL_R - 2 > px && bx - BALL_R + 2 < px + PIPE_W) {
        if (by - BALL_R + 2 < th || by + BALL_R - 2 > th + gap) {
          endGame(); return;
        }
      }
    }
 
    // Move stars
    stars.forEach(s => {
      s.x -= s.s * 0.7;
      s.twinkle += 0.04;
      if (s.x < 0) { s.x = W; s.y = Math.random() * H; }
    });
  }
 
  function draw() {
    // Background
    ctx.fillStyle = '#0d0d1f';
    ctx.fillRect(0, 0, W, H);
 
    // Stars
    stars.forEach(s => {
      ctx.globalAlpha = 0.3 + Math.sin(s.twinkle) * 0.25;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
 
    // Ceiling & floor
    ctx.fillStyle = '#1a1a3a';
    ctx.fillRect(0, 0, W, CEIL);
    ctx.fillRect(0, GROUND, W, H - GROUND);
 
    // Dashed guide lines
    ctx.strokeStyle = 'rgba(83,74,183,0.5)';
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 8]);
    ctx.beginPath(); ctx.moveTo(0, CEIL); ctx.lineTo(W, CEIL); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND); ctx.stroke();
    ctx.setLineDash([]);
 
    // Pillars
    pillars.forEach(p => {
      // Top pillar
      ctx.fillStyle = '#0f6e56';
      ctx.beginPath();
      ctx.roundRect(p.x, CEIL, PIPE_W, p.topH - CEIL, [0, 0, 8, 8]);
      ctx.fill();
      ctx.fillStyle = '#1d9e75';
      ctx.fillRect(p.x + 4, CEIL, PIPE_W - 8, p.topH - CEIL - 8);
      // Bottom pillar
      ctx.fillStyle = '#0f6e56';
      ctx.beginPath();
      ctx.roundRect(p.x, p.topH + p.gap, PIPE_W, GROUND - p.topH - p.gap, [8, 8, 0, 0]);
      ctx.fill();
      ctx.fillStyle = '#1d9e75';
      ctx.fillRect(p.x + 4, p.topH + p.gap + 8, PIPE_W - 8, GROUND - p.topH - p.gap - 8);
      // Highlight
      ctx.strokeStyle = '#5dcaa5';
      ctx.lineWidth = 1;
      ctx.strokeRect(p.x + 1, CEIL + 1, PIPE_W - 2, p.topH - CEIL - 2);
      ctx.strokeRect(p.x + 1, p.topH + p.gap + 1, PIPE_W - 2, GROUND - p.topH - p.gap - 2);
      // Gap indicator line
      ctx.strokeStyle = 'rgba(93,202,165,0.15)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 5]);
      ctx.beginPath();
      ctx.moveTo(p.x, p.topH + p.gap / 2);
      ctx.lineTo(p.x + PIPE_W, p.topH + p.gap / 2);
      ctx.stroke();
      ctx.setLineDash([]);
    });
 
    // Ball trail
    ball.trail.forEach((t, i) => {
      ctx.globalAlpha = (1 - i / 10) * 0.2;
      ctx.fillStyle = '#7f77dd';
      const r = BALL_R * (1 - i / 14);
      ctx.beginPath();
      ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
 
    // Ball body
    ctx.fillStyle = '#7f77dd';
    ctx.beginPath();
    ctx.arc(BALL_X, ball.y, BALL_R, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#afa9ec';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(BALL_X, ball.y, BALL_R, 0, Math.PI * 2);
    ctx.stroke();
 
    // Eye (flips with gravity)
    const eyeDir = ball.gravDir === 1 ? -1 : 1;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(BALL_X + 5, ball.y + eyeDir * 3, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(BALL_X + 6, ball.y + eyeDir * 3, 2, 0, Math.PI * 2);
    ctx.fill();
 
    // Gravity direction arrow
    const arrowY = ball.gravDir === 1 ? ball.y + BALL_R + 8 : ball.y - BALL_R - 4;
    ctx.fillStyle = '#c0b8ff';
    ctx.font = '10px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(ball.gravDir === 1 ? '▼' : '▲', BALL_X, arrowY);
  }
 
  function gameLoop() {
    update();
    draw();
    animId = requestAnimationFrame(gameLoop);
  }
 
  function startGame() {
    initGame();
    ui.style.display = 'none';
    scoreEl.style.display = 'block';
    bestEl.style.display = 'block';
    state = 'playing';
    if (animId) cancelAnimationFrame(animId);
    gameLoop();
  }
 
  function endGame() {
    state = 'dead';
    cancelAnimationFrame(animId);
    if (score > best) best = score;
    bestEl.textContent = 'best: ' + best;
    screen.querySelector('h2').textContent = '💥 Game Over';
    screen.querySelector('p').innerHTML =
      `You scored <b>${score}</b> point${score !== 1 ? 's' : ''}.<br>Keep going — you've got this!`;
    startBtn.textContent = 'Play Again';
    ui.style.display = 'flex';
  }
 
  // Controls
  startBtn.addEventListener('click', startGame);
  document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); flip(); }
  });
  canvas.addEventListener('click', flip);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); flip(); }, { passive: false });
 
  // Draw initial background
  ctx.fillStyle = '#0d0d1f';
  ctx.fillRect(0, 0, W, H);
  stars.forEach(s => {
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
</script>
</body>
</html>
